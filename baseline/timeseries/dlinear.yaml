bitcoin:
  data_path: data/source_data/bitcoin/v1/bitcoin_price_news.csv
  date_column: Date
  numeric_features:
    - Open
    - High
    - Low
    - Volume
  target_column: Close
  max_rows: 1000
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

economy:
  data_path: data/processed_data/economy/Economy_with_text_summarized_with_embeddings_Qwen_Qwen3-Embedding-4B_lag_3.csv
  date_column: date
  numeric_features:
    - Exports
    - Imports
  target_column: OT
  max_rows: 1000
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
