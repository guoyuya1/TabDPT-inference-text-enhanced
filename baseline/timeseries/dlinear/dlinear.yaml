    - Wholesale broiler composite
    - Retail-wholesale spread for broiler composite
  target_column: OT
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

social_good:
  data_path: data/source_data/social_good/SocialGood_with_text.csv
  date_column: date
  target_column: OT
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

traffic:
