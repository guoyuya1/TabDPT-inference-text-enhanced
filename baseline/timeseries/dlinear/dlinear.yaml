bitcoin:
  data_path: data/source_data/bitcoin/v1/bitcoin_price_news.csv
  date_column: Date
  numeric_features:
    - Open
    - High
    - Low
    - Volume
  target_column: Close
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.12

economy:
  data_path: data/processed_data/economy/Economy_with_text_summarized_with_embeddings_Qwen_Qwen3-Embedding-4B_lag_3.csv
  date_column: date
  numeric_features:
    - Exports
    - Imports
  target_column: OT
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

agriculture:
  data_path: data/source_data/agriculture/Agriculture_with_text.csv
