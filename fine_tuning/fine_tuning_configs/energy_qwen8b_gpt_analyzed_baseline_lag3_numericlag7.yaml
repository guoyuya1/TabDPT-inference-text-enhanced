data_path: data/processed_data/energy/Energy_with_text_gpt_analyzed_concise_with_embeddings_Qwen-Qwen3-Embedding-8B_lag_7_with_numeric_lag14.csv
date_column: date
numeric_features:
- OT_lag1
- OT_lag2
- OT_lag3
target_column: OT
embedding_columns:
- embedding_search_fact_summary_gpt_5_2_lag1
- embedding_search_fact_summary_gpt_5_2_lag2
- embedding_search_fact_summary_gpt_5_2_lag3
seed: 0
max_rows: 1000
context_ratio: 0.2
tune_ratio: 0.65
eval_ratio: 0.15
model:
  device: auto
  model_weight_path: null
  text_enhanced: true
  use_flash: true
  compile_model: true
tuning:
  epochs: 20
  gate_lr: 0.5
  gate_logit_clamp: 10.0
  tune_batch_size: 650
  max_context_for_tune: 1000
  max_context_for_eval: 1000
  max_context_for_tune_eval: 1000
  eval_each_epoch: false
  debug_text_effect: true
  plot_output_root: results/fine_tune_plots
  step_log_every: 50
