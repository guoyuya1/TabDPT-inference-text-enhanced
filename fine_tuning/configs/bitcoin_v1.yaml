  debug_text_effect: true
  log_text_mixing_params: true
  step_log_every: 50
  early_stopping_patience: 10
  log_text_score_stats: true
  text_score_sample_size: 8
seed: 0
prediction_window: 3
model:
  device: auto
  model_weight_path: null
  text_attn_layers: [15, 16]
  use_flash: true
  compile_model: true
