data_path: data/processed_data_time_features/bitcoin/bitcoin_gpt_analyzed_embedding.csv
date_column: Date
calendar_frequency: day
seasonality_k: 3
numeric_features:
- Open_lag1
- Open_lag2
- High_lag1
- High_lag2
- Low_lag1
- Low_lag2
- Close_lag1
- Close_lag2
- Adj_Close_lag1
- Adj_Close_lag2
- Adj_Close_lag3
- Adj_Close_lag4
- Adj_Close_lag5
- Adj_Close_lag6
- Adj_Close_lag7
- Adj_Close_lag8
- Adj_Close_lag9
- Adj_Close_lag10
- Adj_Close_lag11
- Adj_Close_lag12
- Adj_Close_lag13
- Adj_Close_lag14
- Adj_Close_lag15
- Adj_Close_lag16
- Adj_Close_lag17
- Adj_Close_lag18
- Adj_Close_lag19
- Adj_Close_lag20
- Adj_Close_lag21
- Adj_Close_lag22
- Adj_Close_lag23
- Adj_Close_lag24
- Volume_lag1
- Volume_lag2
target_column: Adj_Close
embedding_lags: []
embedding_columns:
- embedding_summary_gpt-5.2_lag1
- embedding_summary_gpt-5.2_lag2
- embedding_summary_gpt-5.2_lag3
embedding_column_template: null
seed: 0
prediction_window: 6
max_rows: 1000
context_ratio: 0.2
train_ratio: 0.5
val_ratio: 0.1
test_ratio: 0.2
model:
  device: auto
  model_weight_path: null
  text_attn_layers: [1,16]
  use_flash: true
  compile_model: true
tuning:
  epochs: 30
  gate_lr: 0.1
  text_attn_lr: 0.01
  gate_logit_clamp: 10.0
  tune_batch_size: 256
  max_context: 1000
  debug_text_effect: true
  log_text_mixing_params: true
  step_log_every: 50
  early_stopping_patience: 3
  log_text_score_stats: true
  text_score_sample_size: 8
  attention_dropout_p: 0.1
  qk_norm_type: rmsnorm
  text_attention_logit_l2: 0.001
