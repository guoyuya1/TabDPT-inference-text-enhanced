data_path: data/processed_data/agriculture/v3/agriculture_gpt_analyzed_embedding.csv
date_column: date
calendar_frequency: month
seasonality_k: 3
target_mode: target_differencing
numeric_features:
# - Wholesale broiler composite_lag1
# - Wholesale broiler composite_lag2
# - Retail-wholesale spread for broiler composite_lag1
# - Retail-wholesale spread for broiler composite_lag2
# Keep target lag names as OT_lagN; target_differencing mode rewrites them
# to lagged first-difference values at runtime.
- OT_lag1
- OT_lag2
- OT_lag3
- OT_lag4
- OT_lag5
- OT_lag6
- OT_lag7
- OT_lag8
# - OT_lag9
# - OT_lag10
# - OT_lag11
# - OT_lag12
# - OT_lag13
# - OT_lag14
# - OT_lag15
# - OT_lag16
# - OT_lag17
# - OT_lag18
# - OT_lag19
# - OT_lag20
# - OT_lag21
# - OT_lag22
# - OT_lag23
# - OT_lag24
target_column: OT
embedding_lags: []
embedding_columns:
- embedding_search_fact_summary_gpt_5_2_lag1
- embedding_search_fact_summary_gpt_5_2_lag2
- embedding_search_fact_summary_gpt_5_2_lag3
embedding_column_template: null
seed: 0
prediction_window: 3
max_rows: 288
context_ratio: 0.2
train_ratio: 0.5
val_ratio: 0.1
test_ratio: 0.2
model:
  device: auto
  model_weight_path: null
  text_attn_layers: [1,16]
  use_flash: true
  compile_model: true
tuning:
  epochs: 30
  gate_lr: 0.1
  text_attn_lr: 0.01
  gate_logit_clamp: 3.0
  tune_batch_size: 256
  max_context: 500
  debug_text_effect: true
  log_text_mixing_params: true
  step_log_every: 50
  early_stopping_patience: 3
  log_text_score_stats: true
  text_score_sample_size: 8
  attention_dropout_p: 0.1
  text_qk_norm: rmsnorm
  text_attention_logit_l2: 0.001
