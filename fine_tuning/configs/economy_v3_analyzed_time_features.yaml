data_path: data/processed_data_time_features/economy/economy_v3_gpt_analyzed.csv
date_column: date
calendar_frequency: month
seasonality_k: 3
numeric_features:
- Exports_lag1
- Exports_lag2
- Exports_lag3
- Imports_lag1
- Imports_lag2
- Imports_lag3
- OT_lag1
- OT_lag2
- OT_lag3
target_column: OT
embedding_lags: []
embedding_columns:
- embedding_search_fact_summary_gpt_5_2_lag1
- embedding_search_fact_summary_gpt_5_2_lag2
- embedding_search_fact_summary_gpt_5_2_lag3
embedding_column_template: null
seed: 0
prediction_window: 1
max_rows: 447
context_ratio: 0.2
train_ratio: 0.5
val_ratio: 0.1
test_ratio: 0.2
model:
  device: auto
  model_weight_path: null
  text_attn_layers: [1,16]
  use_flash: true
  compile_model: true
tuning:
  epochs: 30
  gate_lr: 0.1
  text_attn_lr: 0.01
  gate_logit_clamp: 10.0
  tune_batch_size: 256
  max_context: 500
  debug_text_effect: true
  log_text_mixing_params: true
  step_log_every: 50
  early_stopping_patience: 3
  log_text_score_stats: true
  text_score_sample_size: 8
